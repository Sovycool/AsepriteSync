openapi: "3.1.0"

info:
  title: AsepriteSync API
  version: "0.1.0"
  description: |
    REST API for AsepriteSync — file versioning and real-time collaboration
    for Aseprite pixel art projects.

    **Authentication**: all routes except `/auth/*` require an
    `Authorization: Bearer <access_token>` header.

    **WebSocket**: connect to `ws://<host>/?token=<access_token>` for
    real-time file and presence events.

servers:
  - url: http://localhost:4000
    description: Local development

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ------ Common ----------------------------------------------------------

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:    { type: string }
            message: { type: string }
          required: [code, message]
      required: [error]

    # ------ Auth ------------------------------------------------------------

    AuthTokens:
      type: object
      properties:
        data:
          type: object
          properties:
            accessToken: { type: string }
            user:         { $ref: "#/components/schemas/User" }
          required: [accessToken, user]
      required: [data]

    # ------ User ------------------------------------------------------------

    User:
      type: object
      properties:
        id:        { type: string, format: uuid }
        email:     { type: string, format: email }
        username:  { type: string }
        avatarUrl: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, email, username, createdAt, updatedAt]

    # ------ Project ---------------------------------------------------------

    Project:
      type: object
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        description: { type: string, nullable: true }
        ownerId:     { type: string, format: uuid }
        role:        { $ref: "#/components/schemas/Role" }
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }
      required: [id, name, ownerId, role, createdAt, updatedAt]

    Role:
      type: string
      enum: [owner, editor, viewer]

    ProjectMember:
      type: object
      properties:
        userId:    { type: string, format: uuid }
        email:     { type: string, format: email }
        username:  { type: string }
        avatarUrl: { type: string, nullable: true }
        role:      { $ref: "#/components/schemas/Role" }
        joinedAt:  { type: string, format: date-time }
      required: [userId, email, username, role, joinedAt]

    # ------ File ------------------------------------------------------------

    AsepriteFile:
      type: object
      properties:
        id:               { type: string, format: uuid }
        projectId:        { type: string, format: uuid }
        name:             { type: string }
        currentVersionId: { type: string, format: uuid, nullable: true }
        lockedBy:         { type: string, format: uuid, nullable: true }
        lockedByUsername: { type: string, nullable: true }
        lockExpiresAt:    { type: string, format: date-time, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
      required: [id, projectId, name, createdAt, updatedAt]

    FileVersion:
      type: object
      properties:
        id:            { type: string, format: uuid }
        fileId:        { type: string, format: uuid }
        versionNumber: { type: integer }
        authorId:      { type: string, format: uuid }
        sizeBytes:     { type: integer }
        isPinned:      { type: boolean }
        previewPath:   { type: string, nullable: true }
        createdAt:     { type: string, format: date-time }
      required: [id, fileId, versionNumber, authorId, sizeBytes, isPinned, createdAt]

    LockResult:
      type: object
      properties:
        id:            { type: string, format: uuid }
        lockedBy:      { type: string, format: uuid, nullable: true }
        lockExpiresAt: { type: string, format: date-time, nullable: true }
      required: [id]

    PageMeta:
      type: object
      properties:
        cursor:  { type: string, nullable: true }
        hasMore: { type: boolean }
      required: [hasMore]

security:
  - bearerAuth: []

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------

paths:

  # ---- Auth ----------------------------------------------------------------

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:    { type: string, format: email }
                username: { type: string, minLength: 2, maxLength: 40 }
                password: { type: string, minLength: 8 }
              required: [email, username, password]
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthTokens" }
        "409": { description: Email or username already taken }

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and obtain tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:    { type: string, format: email }
                password: { type: string }
              required: [email, password]
      responses:
        "200":
          description: OK — access token in body, refresh token in `Set-Cookie`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthTokens" }
        "401": { description: Invalid credentials }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using the refresh cookie
      security: []
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthTokens" }
        "401": { description: Missing or invalid refresh token }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Request a password-reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
              required: [email]
      responses:
        "200": { description: Reset email sent (always 200 to prevent user enumeration) }

  /auth/reset-password/{token}:
    post:
      tags: [Auth]
      summary: Apply a password reset
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password: { type: string, minLength: 8 }
              required: [password]
      responses:
        "200": { description: Password updated }
        "400": { description: Token invalid or expired }

  # ---- Users ---------------------------------------------------------------

  /users/me:
    get:
      tags: [Users]
      summary: Get the authenticated user's profile
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/User" }
    patch:
      tags: [Users]
      summary: Update the authenticated user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:  { type: string, minLength: 2, maxLength: 40 }
                avatarUrl: { type: string, nullable: true }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/User" }
        "409": { description: Username taken }

  # ---- Projects ------------------------------------------------------------

  /projects:
    get:
      tags: [Projects]
      summary: List projects the requester belongs to
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Project" }
    post:
      tags: [Projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:        { type: string, minLength: 1, maxLength: 80 }
                description: { type: string, maxLength: 500 }
              required: [name]
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Project" }

  /projects/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Projects]
      summary: Get a project
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Project" }
        "404": { description: Project not found }
    put:
      tags: [Projects]
      summary: Update project name / description (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:        { type: string, minLength: 1, maxLength: 80 }
                description: { type: string, maxLength: 500, nullable: true }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Project" }
        "403": { description: Not project owner }
    delete:
      tags: [Projects]
      summary: Delete a project (owner only)
      responses:
        "204": { description: Deleted }
        "403": { description: Not project owner }

  /projects/{id}/members:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Projects]
      summary: List project members
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectMember" }
    post:
      tags: [Projects]
      summary: Invite a user by email (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                role:  { $ref: "#/components/schemas/Role" }
              required: [email, role]
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ProjectMember" }
        "404": { description: User not found }
        "409": { description: Already a member }

  /projects/{id}/members/{uid}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: uid
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      tags: [Projects]
      summary: Change a member's role (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { $ref: "#/components/schemas/Role" }
              required: [role]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ProjectMember" }
    delete:
      tags: [Projects]
      summary: Remove a member (owner only, cannot remove self)
      responses:
        "204": { description: Removed }

  # ---- Files ---------------------------------------------------------------

  /projects/{id}/files:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Files]
      summary: List files in a project
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AsepriteFile" }
                  meta: { $ref: "#/components/schemas/PageMeta" }
    post:
      tags: [Files]
      summary: Upload a new .aseprite/.ase file to a project
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/AsepriteFile" }
        "403": { description: Not a project member }
        "413": { description: File too large }
        "422": { description: Unsupported file type }

  /files/batch-download:
    post:
      tags: [Files]
      summary: Download multiple files as a ZIP archive
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fileIds:
                  type: array
                  items: { type: string, format: uuid }
                  minItems: 1
              required: [fileIds]
      responses:
        "200":
          description: ZIP archive
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /files/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Files]
      summary: Download the current version of a file
      responses:
        "200":
          description: Raw file binary
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "403": { description: Not a project member }
        "404": { description: File not found }
    put:
      tags: [Files]
      summary: Upload a new version (replace current)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
              required: [file]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/AsepriteFile" }
        "403": { description: Not a member, or file is locked by someone else }
        "423": { description: File is locked }
    delete:
      tags: [Files]
      summary: Delete a file (owner only)
      responses:
        "204": { description: Deleted }
        "403": { description: Not project owner }

  /files/{id}/preview:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Files]
      summary: Get PNG thumbnail of the current version
      responses:
        "200":
          description: PNG image
          content:
            image/png:
              schema: { type: string, format: binary }
        "404": { description: Preview not yet generated }

  /files/{id}/versions:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Files]
      summary: List version history (newest first)
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/FileVersion" }
                  meta: { $ref: "#/components/schemas/PageMeta" }

  /files/{id}/versions/{v}/restore:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: v
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Files]
      summary: Restore a previous version (creates a new version copy)
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/FileVersion" }
        "403": { description: Viewers cannot restore }
        "404": { description: Version not found }

  /files/{id}/lock:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Files]
      summary: Acquire an exclusive edit lock
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/LockResult" }
        "403": { description: Not a member }
        "423": { description: Already locked by someone else }
    delete:
      tags: [Files]
      summary: Release an edit lock
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/LockResult" }
        "403": { description: Cannot release another user's lock (unless owner) }

# ---------------------------------------------------------------------------
# WebSocket events
# ---------------------------------------------------------------------------

x-websocket:
  url: "ws://localhost:4000/"
  auth: "?token=<access_token>"
  description: |
    After connecting, clients join project rooms to receive scoped events.

  clientMessages:
    join:
      description: Subscribe to events for a project
      schema:
        type: object
        properties:
          type:      { const: join }
          projectId: { type: string, format: uuid }
    leave:
      description: Unsubscribe from a project room
      schema:
        type: object
        properties:
          type:      { const: leave }
          projectId: { type: string, format: uuid }

  serverMessages:
    file.uploaded:
      description: A new file was uploaded to the project
      schema:
        type: object
        properties:
          type:      { const: file.uploaded }
          projectId: { type: string }
          fileId:    { type: string }
          fileName:  { type: string }
    file.updated:
      description: A file received a new version
      schema:
        type: object
        properties:
          type:      { const: file.updated }
          projectId: { type: string }
          fileId:    { type: string }
    file.deleted:
      description: A file was deleted
      schema:
        type: object
        properties:
          type:      { const: file.deleted }
          projectId: { type: string }
          fileId:    { type: string }
    file.locked:
      description: A file was locked
      schema:
        type: object
        properties:
          type:      { const: file.locked }
          projectId: { type: string }
          fileId:    { type: string }
          lockedBy:  { type: string }
    file.unlocked:
      description: A file lock was released
      schema:
        type: object
        properties:
          type:      { const: file.unlocked }
          projectId: { type: string }
          fileId:    { type: string }
    presence.update:
      description: Active viewers in a project changed
      schema:
        type: object
        properties:
          type:      { const: presence.update }
          projectId: { type: string }
          users:
            type: array
            items:
              type: object
              properties:
                userId:       { type: string }
                username:     { type: string }
                activeFileId: { type: string, nullable: true }
